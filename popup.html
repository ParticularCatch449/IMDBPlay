<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IMDBPlay</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="header">
      <img src="icons/icon48.png" alt="" class="header__icon" width="24" height="24" />
      <h1 class="header__title">IMDBPlay</h1>
    </header>

    <form class="search" id="search-form" role="search">
      <div class="search__field">
        <input
          type="search"
          id="search-input"
          class="search__input"
          placeholder="Search movies &amp; TV…"
          autocomplete="off"
          spellcheck="false"
          aria-label="Search movies and TV"
          aria-controls="results"
          aria-expanded="false"
        />
        <button type="submit" class="search__btn" aria-label="Search">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2" />
            <path d="M20 20l-4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
          </svg>
        </button>
      </div>
    </form>

    <div id="status" class="status" hidden></div>
    <ul id="results" class="results" role="listbox" aria-label="Search results"></ul>
    <div id="imdb-search" class="imdb-search" hidden>
      <a
        id="imdb-search-link"
        class="imdb-search__link"
        href="#"
        target="_blank"
        rel="noopener noreferrer"
      >
        View results on IMDb
      </a>
    </div>

    <footer class="footer">
      <a
        class="footer__link"
        href="https://ko-fi.com/particularcatch"
        target="_blank"
        rel="noopener noreferrer"
      >
        <span aria-hidden="true">☕</span> Support IMDBPlay
      </a>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
